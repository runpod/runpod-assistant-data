name: Validate Authentication

on:
  pull_request:
    branches:
      - main

jobs:
  validate-mastra-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Check MASTRA_API_KEY exists
        env:
          MASTRA_API_KEY: ${{ secrets.MASTRA_API_KEY }}
        run: |
          if [ -z "$MASTRA_API_KEY" ]; then
            echo "::error::MASTRA_API_KEY secret is not configured"
            exit 1
          fi
          echo "✅ MASTRA_API_KEY secret is configured"

      - name: Validate Mastra API authentication
        env:
          MASTRA_API_KEY: ${{ secrets.MASTRA_API_KEY }}
        run: |
          # Test authentication by checking if we can reach the workflow endpoint
          response=$(curl -s -w "\n%{http_code}" \
            "https://runpod-assistant.mastra.cloud/api/workflows" \
            -H "Authorization: Bearer $MASTRA_API_KEY")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body (HTTP $http_code)"

          if [ "$http_code" -eq 401 ] || [ "$http_code" -eq 403 ]; then
            echo "::error::MASTRA_API_KEY authentication failed - key may be invalid or expired"
            exit 1
          fi

          if [ "$http_code" -ge 400 ]; then
            echo "::warning::Mastra API returned HTTP $http_code - endpoint may be unavailable"
          fi

          echo "✅ Mastra API authentication successful"
