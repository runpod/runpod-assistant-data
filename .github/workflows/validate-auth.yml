name: Validate Authentication

on:
  pull_request:
    branches:
      - main

jobs:
  validate-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Runpod Assistant authentication
        env:
          RUNPOD_ASSISTANT_BASE_URL: ${{ secrets.RUNPOD_ASSISTANT_BASE_URL }}
          RUNPOD_ASSISTANT_API_KEY: ${{ secrets.RUNPOD_ASSISTANT_API_KEY }}
        run: |
          chmod +x .github/scripts/validate-auth.sh
          .github/scripts/validate-auth.sh
