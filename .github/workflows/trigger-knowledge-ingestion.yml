name: Trigger Knowledge Ingestion

on:
  push:
    branches:
      - main
    paths:
      - 'knowledge/**'
      - 'scraped/**'
  workflow_dispatch:

jobs:
  trigger-ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger knowledge ingestion workflow
        env:
          RUNPOD_ASSISTANT_BASE_URL: ${{ secrets.RUNPOD_ASSISTANT_BASE_URL }}
          RUNPOD_ASSISTANT_API_KEY: ${{ secrets.RUNPOD_ASSISTANT_API_KEY }}
        run: |
          chmod +x .github/scripts/trigger-ingestion.sh
          .github/scripts/trigger-ingestion.sh
